<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>禊管理アプリ</title>
  <style>
    /* ===== 全体 ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      color: #eee;
      font-family: sans-serif;
      padding: 16px;
    }
    h1 {
      text-align: center;
      font-size: 1.2rem;
      margin-bottom: 16px;
      color: #fff;
      letter-spacing: 0.1em;
    }

    /* ===== タブボタン ===== */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .tabs button {
      flex: 1;
      padding: 10px;
      border: 1px solid #555;
      background: #222;
      color: #aaa;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .tabs button.active {
      background: #c00;
      color: #fff;
      border-color: #c00;
    }

    /* ===== タブの中身 ===== */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ===== タブ①：公式リンク ===== */
    .official-link {
      display: block;
      text-align: center;
      background: #c00;
      color: #fff;
      padding: 14px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 1rem;
      margin-bottom: 12px;
    }
    .note {
      font-size: 0.8rem;
      color: #888;
      text-align: center;
    }

    /* ===== タブ②：公演テーブル ===== */
    .table-wrap {
      overflow-x: auto; /* スマホで横スクロール可能に */
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      min-width: 400px;
    }
    th {
      background: #c00;
      color: #fff;
      padding: 8px 10px;
      text-align: left;
      white-space: nowrap;
    }
    td {
      padding: 8px 10px;
      border-bottom: 1px solid #333;
      vertical-align: top;
    }
    tr:hover td { background: #1a1a1a; }

    /* 「更新」バッジ */
    .badge {
      display: inline-block;
      background: #c00;
      color: #fff;
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 3px;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* 過去の公演をグレーアウト */
    tr.past td { color: #555; }
  </style>
</head>
<body>

  <h1>⚡ 禊管理アプリ</h1>

  <!-- タブボタン -->
  <div class="tabs">
    <button class="active" onclick="switchTab('official', this)">公式ページ</button>
    <button onclick="switchTab('livelist', this)">公演一覧</button>
  </div>

  <!-- タブ① 公式ページ -->
  <div id="official" class="tab-content active">
    <a class="official-link"
       href="https://zigzag.asia/live.html"
       target="_blank">
      🔗 公式ライブページを開く
    </a>
    <p class="note">※別タブで公式サイトが開きます</p>
  </div>

  <!-- タブ② 公演一覧 -->
  <div id="livelist" class="tab-content">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>日付</th>
            <th>都道府県</th>
            <th>会場</th>
            <th>ツアー</th>
          </tr>
        </thead>
        <tbody id="live-tbody">
          <!-- JavaScriptで自動生成 -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // =============================================
    // ★ 公演データ：ここを編集して公演を追加・修正
    // =============================================
    const lives = [
      { date: "2026.05.25", pref: "東京",  venue: "Kanadevia Hall",                                        tour: "47都道府県 ゆっくり行脚禊 〜第二弾〜", note: "プレライブ", updated: false },
      { date: "2026.06.03", pref: "埼玉",  venue: "川口総合文化センター・リリア メインホール",             tour: "47都道府県 ゆっくり行脚禊 〜第二弾〜", note: "", updated: false },
      { date: "2026.06.07", pref: "栃木",  venue: "栃木県総合文化センター メインホール",                   tour: "47都道府県 ゆっくり行脚禊 〜第二弾〜", note: "", updated: false },
      { date: "2026.06.10", pref: "熊本",  venue: "熊本城ホール メインホール",                             tour: "47都道府県 ゆっくり行脚禊 〜第二弾〜", note: "", updated: false },
      { date: "2026.06.12", pref: "鹿児島",venue: "指宿市民会館",                                          tour: "47都道府県 ゆっくり行脚禊 〜第二弾〜", note: "", updated: false },
      { date: "2026.09.08", pref: "愛知",  venue: "Niterra日本特殊陶業市民会館 フォレストホール",          tour: "47都道府県 ゆっくり行脚禊 〜第二弾〜", note: "", updated: true  },
      { date: "2026.09.11", pref: "石川",  venue: "本多の森北電ホール",                                    tour: "47都道府県 ゆっくり行脚禊 〜第二弾〜", note: "", updated: true  },
      { date: "2026.09.19", pref: "山梨",  venue: "YCC県民文化ホール（山梨県立県民文化ホール）大ホール",   tour: "47都道府県 ゆっくり行脚禊 〜第二弾〜", note: "", updated: true  },
      { date: "2026.09.23", pref: "長崎",  venue: "ベネックス長崎ブリックホール 大ホール",                 tour: "47都道府県 ゆっくり行脚禊 〜第二弾〜", note: "", updated: true  },
      { date: "2026.09.26", pref: "沖縄",  venue: "沖縄コンベンションセンター劇場棟",                     tour: "47都道府県 ゆっくり行脚禊 〜第二弾〜", note: "", updated: true  },
    ];

    // =============================================
    // 今日の日付を取得（過去公演のグレーアウト用）
    // =============================================
    const today = new Date();

    // =============================================
    // テーブルを自動生成する関数
    // =============================================
    function buildTable() {
      const tbody = document.getElementById("live-tbody");
      tbody.innerHTML = ""; // 一旦リセット

      lives.forEach(function(live) {
        // 日付文字列 "2026.05.25" → Dateオブジェクトに変換
        const liveDateStr = live.date.replace(/\./g, "-"); // "2026-05-25"
        const liveDate = new Date(liveDateStr);
        const isPast = liveDate < today; // 過去かどうか

        // <tr>を作る
        const tr = document.createElement("tr");
        if (isPast) tr.classList.add("past"); // 過去ならグレーアウト

        // 「更新」バッジのHTML
        const badgeHTML = live.updated ? '<span class="badge">更新</span>' : "";

        // セルの中身を組み立てる
        tr.innerHTML = `
          <td>${live.date}</td>
          <td>${live.pref}</td>
          <td>${live.venue}${badgeHTML}</td>
          <td>${live.note ? live.note + " / " : ""}${live.tour}</td>
        `;

        tbody.appendChild(tr); // テーブルに追加
      });
    }

    // =============================================
    // タブ切替関数
    // =============================================
    function switchTab(tabId, btn) {
      // すべて非表示・非アクティブに
      document.querySelectorAll(".tab-content").forEach(el => el.classList.remove("active"));
      document.querySelectorAll(".tabs button").forEach(el => el.classList.remove("active"));
      // 選択したものだけ表示
      document.getElementById(tabId).classList.add("active");
      btn.classList.add("active");
    }

    // ページ読み込み時にテーブルを作る
    buildTable();
  </script>

</body>
</html>
